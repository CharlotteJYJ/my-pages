<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐾 KK AI Daily</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d0d1a;--sidebar:#12122a;--card:#1a1a32;--card-hover:#24244a;--text:#eaeaea;--muted:#6a6a8a;--border:#2a2a4a;--industry:#00a8cc;--meituan:#e65a30;--huati:#9b59b6;--accent:#ffd000;--scroll-thumb:#3a3a5a}
[data-theme="light"]{--bg:#f5f5f7;--sidebar:#fff;--card:#fff;--card-hover:#f0f0f5;--text:#1d1d1f;--muted:#6e6e80;--border:#e5e5ea;--industry:#007aff;--meituan:#ff9500;--huati:#8e44ad;--scroll-thumb:#c7c7cc}
body{font-family:'Noto Sans SC',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}
.header{position:sticky;top:0;z-index:100;background:var(--sidebar);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;transition:background .3s}
.header-title{font-size:1.1rem;font-weight:800;display:flex;align-items:center;gap:8px}
.header-title span{color:var(--accent)}
.theme-toggle{display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px 12px;border-radius:20px;background:var(--card);transition:background .2s}
.theme-toggle:hover{background:var(--card-hover)}
.theme-toggle .icon{font-size:1rem}
.theme-toggle .label{font-size:.72rem;color:var(--muted)}
.container{display:grid;grid-template-columns:260px 1fr 280px;min-height:calc(100vh - 46px);padding:0 20px}
.calendar-sidebar{background:var(--sidebar);border-right:1px solid var(--border);padding:20px;transition:background .3s}
.calendar-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.calendar-month{font-size:.95rem;font-weight:800}
.calendar-nav{display:flex;gap:4px}
.calendar-nav button{background:var(--card);border:1px solid var(--border);color:var(--text);width:26px;height:26px;border-radius:6px;cursor:pointer;font-size:.85rem;transition:all .2s}
.calendar-nav button:hover{background:var(--accent);color:var(--bg)}
.calendar-weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px}
.calendar-weekday{text-align:center;font-size:.6rem;font-weight:600;color:var(--muted);padding:6px 0}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.calendar-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:600;border-radius:6px;color:var(--muted);cursor:default;transition:all .15s}
.calendar-day.other-month{color:#3a3a5a}
[data-theme="light"] .calendar-day.other-month{color:#d1d1d6}
.calendar-day.has-data{background:var(--card);color:var(--text);cursor:pointer}
.calendar-day.has-data:hover{background:var(--card-hover);transform:scale(1.1)}
.calendar-day.active{background:linear-gradient(135deg,var(--accent),#ffe066)!important;color:var(--bg)!important;font-weight:800;box-shadow:0 2px 8px rgba(255,208,0,0.3)}
.calendar-day.today{border:2px solid var(--accent)}
.content{padding:20px 28px;overflow-y:auto;max-height:calc(100vh - 46px);scrollbar-width:thin;scrollbar-color:var(--scroll-thumb) transparent}
.content::-webkit-scrollbar{width:5px}
.content::-webkit-scrollbar-track{background:transparent}
.content::-webkit-scrollbar-thumb{background:var(--scroll-thumb);border-radius:3px}
.content::-webkit-scrollbar-thumb:hover{background:var(--accent)}
.content-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.content-date{font-size:1.5rem;font-weight:800}
.content-badge{background:linear-gradient(135deg,var(--accent),#ffe666);border-radius:14px;padding:4px 10px;font-size:.65rem;font-weight:700;color:var(--bg)}
/* Tab 切换 */
.tab-bar{display:flex;gap:4px;margin-bottom:18px;background:var(--card);border-radius:12px;padding:4px}
.tab-btn{flex:1;padding:7px 0;border:none;background:transparent;color:var(--muted);font-size:.78rem;font-weight:700;border-radius:8px;cursor:pointer;transition:all .2s;font-family:inherit}
.tab-btn.active{background:linear-gradient(135deg,var(--accent),#ffe066);color:var(--bg)}
.tab-btn:not(.active):hover{background:var(--card-hover);color:var(--text)}
.tab-panel{display:none}
.tab-panel.active{display:block}
.category-section{margin-bottom:22px}
.category-tag{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:18px;font-size:.7rem;font-weight:700;margin-bottom:10px}
.category-tag.industry{background:rgba(0,168,204,0.12);color:var(--industry);border:1px solid rgba(0,168,204,0.25)}
.category-tag.meituan{background:rgba(230,90,48,0.12);color:var(--meituan);border:1px solid rgba(230,90,48,0.25)}
.category-tag.huati{background:rgba(155,89,182,0.12);color:var(--huati);border:1px solid rgba(155,89,182,0.25)}
.news-card{display:block;text-decoration:none;color:inherit;background:var(--card);border-radius:10px;padding:13px 15px;margin-bottom:7px;transition:all .2s;border-left:3px solid var(--industry);position:relative}
.news-card.meituan{border-left-color:var(--meituan)}
.news-card.huati{border-left-color:var(--huati)}
.news-card:hover{background:var(--card-hover);transform:translateX(4px)}
.news-num{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;background:rgba(0,168,204,0.15);color:var(--industry);border-radius:50%;font-size:.58rem;font-weight:800;margin-right:7px}
.news-card.meituan .news-num{background:rgba(230,90,48,0.15);color:var(--meituan)}
.news-card.huati .news-num{background:rgba(155,89,182,0.15);color:var(--huati)}
.news-title{font-weight:600;font-size:.82rem;line-height:1.4}
.news-summary{color:var(--muted);font-size:.72rem;margin-top:3px;margin-left:24px;line-height:1.4}
.news-arrow{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.75rem;opacity:0;transition:opacity .2s}
.news-card:hover .news-arrow{opacity:1}
/* 话题卡片带缩略图 */
.huati-card{display:flex;gap:12px;align-items:flex-start;text-decoration:none;color:inherit;background:var(--card);border-radius:10px;padding:12px 14px;margin-bottom:7px;transition:all .2s;border-left:3px solid var(--huati);position:relative}
.huati-card:hover{background:var(--card-hover);transform:translateX(4px)}
.huati-card-body{flex:1;min-width:0}
.huati-card-thumb{width:72px;height:54px;object-fit:cover;border-radius:6px;flex-shrink:0;background:var(--border)}
.huati-card-thumb-placeholder{width:72px;height:54px;border-radius:6px;flex-shrink:0;background:linear-gradient(135deg,rgba(155,89,182,0.2),rgba(155,89,182,0.05));display:flex;align-items:center;justify-content:center;font-size:1.2rem}
.huati-num{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;background:rgba(155,89,182,0.15);color:var(--huati);border-radius:50%;font-size:.58rem;font-weight:800;margin-right:7px;flex-shrink:0}
.huati-title{font-weight:600;font-size:.82rem;line-height:1.4}
.huati-summary{color:var(--muted);font-size:.72rem;margin-top:4px;line-height:1.4}
.hot-sidebar{background:var(--sidebar);border-left:1px solid var(--border);padding:20px;overflow-y:auto;max-height:calc(100vh - 46px);transition:background .3s}
.hot-header{font-size:.75rem;font-weight:700;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:5px}
.hot-item{display:flex;gap:10px;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);position:relative}
.hot-item:last-child{border-bottom:none}
.hot-num{font-size:.65rem;font-weight:800;min-width:18px;height:18px;display:flex;align-items:center;justify-content:center;border-radius:4px;flex-shrink:0;color:var(--muted)}
.hot-num.top3{background:linear-gradient(135deg,var(--accent),#ff8c00);color:var(--bg)}
.hot-text{font-size:.76rem;line-height:1.3}
.hot-tip{display:none;position:absolute;right:0;top:100%;margin-top:6px;background:var(--card-hover);border:1px solid var(--border);padding:10px 14px;border-radius:8px;font-size:.73rem;line-height:1.4;z-index:200;box-shadow:0 6px 20px rgba(0,0,0,0.3);max-width:280px;white-space:normal;color:var(--text)}
.hot-item:hover .hot-tip{display:block}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:250px;color:var(--muted)}
.empty-icon{font-size:2.5rem;margin-bottom:10px}
@media(max-width:1000px){.container{grid-template-columns:1fr;padding:0}.calendar-sidebar,.hot-sidebar{display:none}}
</style>
</head>

</div>

  var total=startDow+dim;
  var rem=total%7===0?0:7-total%7;
  for(var d=1;d<=rem;d++) h+='<div class="calendar-day other-month">'+d+"</div>";
  document.getElementById("calendarGrid").innerHTML=h;
}

function changeMonth(delta){
  currentMonth+=delta;
  if(currentMonth>12){currentMonth=1;currentYear++}
  if(currentMonth<1){currentMonth=12;currentYear--}
  renderCalendar();
}

function selectDate(ds){
  selectedDate=ds;
  renderCalendar();
  renderContent(ds);
}

function renderContent(ds){
  var el=document.getElementById("contentArea");
  var p=ds.split("-");
  var dd=parseInt(p[1])+"月"+parseInt(p[2])+"日";
  
  var dayAI=daysData[ds];
  var dayHuati=huatiData[ds];
  var totalAI=dayAI?(dayAI.industry.length+dayAI.meituan.length):0;
  var totalHuati=dayHuati?dayHuati.length:0;

  var h='<div class="content-header"><div class="content-date">'+dd+'</div><span class="content-badge">AI '+totalAI+'条 · 话题'+totalHuati+'条</span></div>';
  
  // Tab bar
  h+='<div class="tab-bar">';
  h+='<button class="tab-btn'+(activeTab==="aidaily"?" active":"")+'" onclick="switchTab(\'aidaily\')">📰 AI Daily</button>';
  h+='<button class="tab-btn'+(activeTab==="huati"?" active":"")+'" onclick="switchTab(\'huati\')">🔥 话题动态</button>';
  h+='</div>';

  // AI Daily panel
  h+='<div class="tab-panel'+(activeTab==="aidaily"?" active":"")+'" id="panel-aidaily">';
  if(!dayAI){
    h+='<div class="empty"><div class="empty-icon">📭</div><div>该日期暂无AI日报</div></div>';
  } else {
    if(dayAI.industry.length){
      h+='<div class="category-section"><div class="category-tag industry">🌍 行业动态</div>';
      dayAI.industry.forEach(function(item,i){
        var url=item.url;var tgt=url?' target="_blank"':"";var nourl=url?'':' style="cursor:default;opacity:.85"';
        h+='<a href="'+(url||"javascript:void(0)")+'"'+tgt+nourl+' class="news-card"><div class="news-title"><span class="news-num">'+(i+1)+'</span>'+item.title+'</div>'+(item.summary?'<div class="news-summary">'+item.summary+'</div>':'')+(url?'<span class="news-arrow">→</span>':'')+'</a>';
      });
      h+="</div>";
    }
    if(dayAI.meituan.length){
      h+='<div class="category-section"><div class="category-tag meituan">🟡 美团&客服</div>';
      dayAI.meituan.forEach(function(item,i){
        var url=item.url;var tgt=url?' target="_blank"':"";var nourl=url?'':' style="cursor:default;opacity:.85"';
        h+='<a href="'+(url||"javascript:void(0)")+'"'+tgt+nourl+' class="news-card meituan"><div class="news-title"><span class="news-num">'+(i+1)+'</span>'+item.title+'</div>'+(item.summary?'<div class="news-summary">'+item.summary+'</div>':'')+(url?'<span class="news-arrow">→</span>':'')+'</a>';
      });
      h+="</div>";
    }
  }
  h+='</div>';

  // 话题动态 panel
  h+='<div class="tab-panel'+(activeTab==="huati"?" active":"")+'" id="panel-huati">';
  if(!dayHuati||!dayHuati.length){
    h+='<div class="empty"><div class="empty-icon">💬</div><div>该日期暂无话题热帖</div></div>';
  } else {
    h+='<div class="category-section"><div class="category-tag huati">🔥 话题社区热帖</div>';
    dayHuati.forEach(function(item,i){
      var url=item.url||"#";var tgt=item.url?' target="_blank"':"";
      var thumb=item.img?'<img class="huati-card-thumb" src="'+item.img+'" onerror="this.style.display=&quot;none&quot;">'
        :'<div class="huati-card-thumb-placeholder">💬</div>';
      h+='<a href="'+url+'"'+tgt+' class="huati-card">';
      h+='<div class="huati-card-body"><div class="huati-title"><span class="huati-num">'+(i+1)+'</span>'+item.title+'</div>'+(item.summary?'<div class="huati-summary">'+item.summary+'</div>':'')+'</div>';
      h+=thumb;
      h+='</a>';
    });
    h+='</div>';
  }
  h+='</div>';

  el.innerHTML=h;
}

function renderHotList(){
  var keys=Object.keys(daysData);
  if(!keys.length) return;
  var day=daysData[keys[0]];
  var items=day.industry.concat(day.meituan).slice(0,8);
  document.getElementById("hotList").innerHTML=items.map(function(item,i){
    return '<div class="hot-item"><span class="hot-num'+(i<3?" top3":"")+ '">'+(i+1)+'</span><span class="hot-text">'+item.title+'</span><div class="hot-tip">'+item.title+'</div></div>';
  }).join("");
}

if(isLight){document.getElementById("themeIcon").textContent="🌙";document.getElementById("themeLabel").textContent="夜间"}
renderCalendar();
renderContent(selectedDate);
renderHotList();
</script>
</body>
</html>
